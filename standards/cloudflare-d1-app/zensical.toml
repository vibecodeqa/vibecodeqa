[project]
site_name = "Cloudflare D1 App - Gold Standard"
site_description = "The gold-standard reference for Cloudflare Workers and Pages Functions using D1, Wrangler migrations, environment-scoped bindings, tenant isolation, and CI deploy gates."
site_author = "VibeCode QA"
site_url = "https://vibecodeqa.online/standards/cloudflare-d1-app/"
repo_url = "https://github.com/vibecodeqa/vibecodeqa"
repo_name = "vibecodeqa/vibecodeqa"
copyright = "The cloudflare-d1-app gold standard - the rubric VibeCode QA judges against."

docs_dir = "docs"
site_dir = "site"

nav = [
  { "Overview" = "index.md" },
  { "Edition v1" = [
    { "About this edition" = "v1/index.md" },
    { "1 - Project shape and bindings" = "v1/project-shape-and-bindings.md" },
    { "2 - Migrations and drift" = "v1/migrations-and-drift.md" },
    { "3 - Environment and tenancy" = "v1/environment-and-tenancy.md" },
    { "4 - Query safety and types" = "v1/query-safety-and-types.md" },
    { "5 - Local parity and testing" = "v1/local-parity-and-testing.md" },
    { "6 - CI and deploy gates" = "v1/ci-and-deploy-gates.md" }
  ] }
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.indexes",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight"
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
