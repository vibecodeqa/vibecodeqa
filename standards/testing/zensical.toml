[project]
site_name = "Testing - Gold Standard"
site_description = "The gold-standard cross-cutting testing rubric VibeCode QA judges across apps, APIs, Workers, MCP servers, CLIs, SDKs, and CI boundaries."
site_author = "VibeCode QA"
site_url = "https://vibecodeqa.online/standards/testing/"
repo_url = "https://github.com/vibecodeqa/vibecodeqa"
repo_name = "vibecodeqa/vibecodeqa"
copyright = "The testing gold standard - the rubric VibeCode QA judges against."

docs_dir = "docs"
site_dir = "site"

nav = [
  { "Overview" = "index.md" },
  { "Edition v1" = [
    { "About this edition" = "v1/index.md" },
    { "1 - Strategy and scope" = "v1/strategy-and-scope.md" },
    { "2 - Unit tests" = "v1/unit-tests.md" },
    { "3 - Integration tests" = "v1/integration-tests.md" },
    { "4 - UI and component tests" = "v1/ui-and-component-tests.md" },
    { "5 - E2E smoke tests" = "v1/e2e-smoke-tests.md" },
    { "6 - Coverage and risk" = "v1/coverage-and-risk.md" },
    { "7 - Mocks, fixtures, and snapshots" = "v1/mocks-fixtures-and-snapshots.md" },
    { "8 - CI and evidence" = "v1/ci-and-evidence.md" },
    { "9 - Flaky, skipped, and generated tests" = "v1/flaky-skipped-and-generated-tests.md" }
  ] }
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.indexes",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight"
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

