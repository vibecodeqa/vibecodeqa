[project]
site_name = "Cloudflare Worker MCP Server - Gold Standard"
site_description = "The gold-standard reference for remote Model Context Protocol servers deployed on Cloudflare Workers. The rubric VibeCode QA judges cloudflare-worker-mcp-server repos against."
site_author = "VibeCode QA"
site_url = "https://vibecodeqa.online/standards/cloudflare-worker-mcp-server/"
repo_url = "https://github.com/vibecodeqa/vibecodeqa"
repo_name = "vibecodeqa/vibecodeqa"
copyright = "The cloudflare-worker-mcp-server gold standard - the rubric VibeCode QA judges against."

docs_dir = "docs"
site_dir = "site"

nav = [
  { "Overview" = "index.md" },
  { "Edition v1" = [
    { "About this edition" = "v1/index.md" },
    { "1 - Project shape" = "v1/project-shape.md" },
    { "2 - Protocol and transport" = "v1/protocol-and-transport.md" },
    { "3 - Authorization and permissions" = "v1/authorization-and-permissions.md" },
    { "4 - Tool schemas and validation" = "v1/tool-schemas-and-validation.md" },
    { "5 - State storage and audit" = "v1/state-storage-and-audit.md" },
    { "6 - Output safety and observability" = "v1/output-safety-and-observability.md" },
    { "7 - Deployment gates" = "v1/deployment-gates.md" }
  ] }
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.indexes",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight"
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

