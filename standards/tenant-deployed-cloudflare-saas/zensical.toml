[project]
site_name = "Tenant-Deployed Cloudflare SaaS - Gold Standard"
site_description = "The gold-standard reference for tenant-scoped SaaS deployments on Cloudflare deployables, data resources, bindings, aliases, promotion gates, provisioning, and auditability."
site_author = "VibeCode QA"
site_url = "https://vibecodeqa.online/standards/tenant-deployed-cloudflare-saas/"
repo_url = "https://github.com/vibecodeqa/vibecodeqa"
repo_name = "vibecodeqa/vibecodeqa"
copyright = "The tenant-deployed-cloudflare-saas gold standard - the rubric VibeCode QA judges against."

docs_dir = "docs"
site_dir = "site"

nav = [
  { "Overview" = "index.md" },
  { "Edition v1" = [
    { "About this edition" = "v1/index.md" },
    { "1 - Suitability and shape" = "v1/suitability-and-shape.md" },
    { "2 - Tenant resources" = "v1/tenant-resources.md" },
    { "3 - Environments, secrets, and bindings" = "v1/environments-secrets-and-bindings.md" },
    { "4 - Preview access and aliases" = "v1/preview-access-and-aliases.md" },
    { "5 - Promotion, data, and rollback" = "v1/promotion-data-and-rollbacks.md" },
    { "6 - Provisioning and runbooks" = "v1/provisioning-and-runbooks.md" },
    { "7 - Observability and audit" = "v1/observability-and-audit.md" }
  ] }
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.indexes",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight"
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
