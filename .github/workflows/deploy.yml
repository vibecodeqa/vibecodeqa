name: Deploy to CF Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Build the documentation site (Zensical, pinned). uv manages its own Python.
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Build docs
        run: cd docs && uvx zensical@0.0.43 build

      # Assemble the publish directory: landing site at root, built docs at /docs.
      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a --exclude '_site' --exclude '.git' --exclude '.github' --exclude 'docs' ./ _site/
          cp -r docs/site _site/docs

      - uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name vibecodeqa
