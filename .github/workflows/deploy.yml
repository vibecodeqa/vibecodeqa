name: Deploy to CF Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # Build the documentation site (Zensical, pinned). uv manages its own Python.
      - uses: astral-sh/setup-uv@v8
      - name: Build docs
        run: cd docs && uvx zensical@0.0.43 build

      # Assemble the publish directory: landing site at root, built docs at /docs.
      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a --exclude '_site' --exclude '.git' --exclude '.github' --exclude 'docs' ./ _site/
          cp -r docs/site _site/docs

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name vibecodeqa
