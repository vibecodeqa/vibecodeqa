name: Deploy to CF Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # Build the documentation site (Zensical, pinned). uv manages its own Python.
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Build docs
        run: cd docs && uvx zensical@0.0.43 build

      # Build each gold-standard KB (a self-contained Zensical subsite under standards/).
      - name: Build standards
        run: |
          for d in standards/*/; do
            if [ -f "$d/zensical.toml" ]; then
              echo "building standard: $d"
              # No --strict: zensical 0.0.43 mis-flags bracket syntax in code spans
              # (e.g. `w-[…px]`, `[#hex]`) as unresolved link references. Matches the docs build.
              (cd "$d" && uvx zensical@0.0.43 build)
            fi
          done

      # Assemble the publish directory: landing site at root, docs at /docs, standards at /standards/<id>.
      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a --exclude '_site' --exclude '.git' --exclude '.github' --exclude 'docs' --exclude 'standards' ./ _site/
          cp -r docs/site _site/docs
          mkdir -p _site/standards
          # standards hub landing page + machine-readable registry at stable URLs
          cp standards/index.html _site/standards/index.html
          cp standards/registry.json _site/standards/registry.json
          for d in standards/*/; do
            name=$(basename "$d")
            [ -d "$d/site" ] && cp -r "$d/site" "_site/standards/$name"
          done

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name vibecodeqa
